<div class="login-container">
  <div class="login-content">
    <!-- Logo & Branding -->
    <div class="login-header">
      <div class="logo">
        <span class="logo-icon">💎</span>
        <h1>GoldFlow Pro</h1>
      </div>
      <p class="tagline">Gold Ledger & Inventory Management System</p>
    </div>

    <!-- Login Form Card -->
    <mat-card class="login-card">
      <mat-card-content>
        <form (ngSubmit)="login()" class="login-form">
          <!-- Username Field -->
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Username</mat-label>
            <input
              matInput
              [(ngModel)]="username"
              name="username"
              placeholder="Enter your username"
              [disabled]="isLoading"
              (keypress)="onKeyPress($event)"
            />
          </mat-form-field>

          <!-- Password Field -->
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input
              matInput
              [(ngModel)]="password"
              name="password"
              [type]="hidePassword ? 'password' : 'text'"
              placeholder="Enter your password"
              [disabled]="isLoading"
              (keypress)="onKeyPress($event)"
            />
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="togglePasswordVisibility()"
              [disabled]="isLoading"
              [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
              class="password-toggle-btn"
            >
              <svg
                *ngIf="hidePassword"
                viewBox="0 0 24 24"
                class="password-eye-icon"
                aria-hidden="true"
              >
                <path
                  d="M12 5C6 5 2.2 9.4 1 12c1.2 2.6 5 7 11 7s9.8-4.4 11-7c-1.2-2.6-5-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"
                  fill="currentColor"
                ></path>
              </svg>
              <svg
                *ngIf="!hidePassword"
                viewBox="0 0 24 24"
                class="password-eye-icon"
                aria-hidden="true"
              >
                <path
                  d="M3.3 2 2 3.3l3 3C3.2 7.7 1.8 9.8 1 12c1.2 2.6 5 7 11 7 2.1 0 3.9-.5 5.5-1.3l3.2 3.2 1.3-1.3L3.3 2ZM12 17c-3.8 0-6.6-2.5-8.1-5 0 0 1-1.7 2.9-3.2l1.7 1.7A4 4 0 0 0 13.5 15l2.3 2.3c-1.1.5-2.3.7-3.8.7Zm8.1-5c0 0-1 1.7-2.9 3.2l-1.6-1.6A4 4 0 0 0 10.4 8.4L8.1 6.1c1.1-.5 2.3-.7 3.9-.7 3.8 0 6.6 2.5 8.1 5Z"
                  fill="currentColor"
                ></path>
              </svg>
            </button>
          </mat-form-field>

          <!-- Login Button -->
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="isLoading"
            class="login-button"
          >
            <span *ngIf="!isLoading">Sign In</span>
            <mat-spinner *ngIf="isLoading" diameter="20" color="accent"></mat-spinner>
            <span *ngIf="isLoading" class="ml-2">Signing In...</span>
          </button>
        </form>
      </mat-card-content>
    </mat-card>

    <!-- Footer -->
    <div class="login-footer">
      <p>&copy; 2026 GoldFlow Pro. All rights reserved.</p>
    </div>
  </div>
</div>
